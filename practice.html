<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Kangaroo · 练习</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0e0e1a;--surface:#16162a;--card:#1e1e38;--border:#2e2e55;
    --accent:#f7c948;--accent2:#ff6b6b;--accent3:#6ee7b7;--accent4:#7c9fff;
    --text:#e8e8f0;--muted:#888899;--easy:#6ee7b7;--medium:#f7c948;--hard:#ff6b6b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 15%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(2px 2px at 50% 70%,rgba(247,201,72,.15) 0%,transparent 100%);}
  nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
    padding:12px 24px;background:rgba(22,22,42,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);}
  .nav-brand{display:flex;align-items:center;gap:10px;font-family:'Fredoka One';font-size:1.2rem;color:var(--accent);}
  .nav-brand span{font-size:1.6rem;}
  .nav-user{display:flex;align-items:center;gap:12px;}
  .user-badge{display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--border);border-radius:999px;padding:6px 16px 6px 8px;}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.8rem;color:#0e0e1a;}
  .user-name{font-weight:700;font-size:0.85rem;}
  .btn-nav{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-family:'Nunito';font-weight:700;font-size:0.8rem;cursor:pointer;transition:all .2s;}
  .btn-nav:hover{border-color:var(--accent4);color:var(--accent4);}
  .stats-strip{position:relative;z-index:10;display:flex;gap:12px;padding:14px 24px;
    background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .stat-chip{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;
    background:var(--card);border:1px solid var(--border);font-size:0.8rem;font-weight:700;}
  .stat-chip .val{font-family:'Fredoka One';font-size:1rem;}
  .stat-chip.c .val{color:var(--easy);}
  .stat-chip.w .val{color:var(--hard);}
  .stat-chip.r .val{color:var(--accent);}
  .stat-chip.t .val{color:var(--accent4);}
  .controls{position:relative;z-index:10;display:flex;flex-wrap:wrap;gap:16px;
    padding:20px 24px;max-width:960px;margin:0 auto;align-items:flex-end;justify-content:center;}
  .control-group{display:flex;flex-direction:column;gap:6px;}
  .control-group label{font-size:0.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{padding:7px 16px;border-radius:999px;border:2px solid var(--border);background:var(--surface);
    color:var(--muted);font-family:'Nunito';font-weight:700;font-size:0.82rem;cursor:pointer;transition:all .2s;}
  .pill:hover{border-color:var(--accent);color:var(--accent);}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#0e0e1a;}
  .pill.easy.active{background:var(--easy);border-color:var(--easy);color:#0e0e1a;}
  .pill.medium.active{background:var(--medium);border-color:var(--medium);color:#0e0e1a;}
  .pill.hard.active{background:var(--hard);border-color:var(--hard);color:#fff;}
  .btn-generate{padding:11px 28px;border-radius:999px;border:none;
    background:linear-gradient(135deg,#f7c948,#ff9a3c);color:#0e0e1a;
    font-family:'Fredoka One';font-size:1rem;cursor:pointer;transition:all .2s;
    box-shadow:0 4px 20px rgba(247,201,72,.3);}
  .btn-generate:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(247,201,72,.4);}
  .problem-area{max-width:860px;margin:0 auto;padding:0 24px 100px;position:relative;z-index:10;}
  .problem-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:28px;margin-bottom:18px;animation:fadeSlide .4s ease both;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
  .problem-card.easy{border-left:4px solid var(--easy);}
  .problem-card.medium{border-left:4px solid var(--medium);}
  .problem-card.hard{border-left:4px solid var(--hard);}
  .problem-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .problem-num{font-family:'Fredoka One';font-size:1.2rem;color:var(--accent);}
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .tag{padding:3px 10px;border-radius:999px;font-size:0.68rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
  .tag.year{background:rgba(124,159,255,.15);color:var(--accent4);border:1px solid rgba(124,159,255,.3);}
  .tag.easy{background:rgba(110,231,183,.15);color:var(--easy);border:1px solid rgba(110,231,183,.3);}
  .tag.medium{background:rgba(247,201,72,.15);color:var(--medium);border:1px solid rgba(247,201,72,.3);}
  .tag.hard{background:rgba(255,107,107,.15);color:var(--hard);border:1px solid rgba(255,107,107,.3);}
  .tag.lv{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3);}
  .problem-text{font-size:1rem;line-height:1.8;color:var(--text);margin-bottom:20px;font-weight:600;}
  .timer-badge{font-family:'JetBrains Mono';font-size:0.8rem;color:var(--accent4);
    background:rgba(124,159,255,.1);border:1px solid rgba(124,159,255,.2);border-radius:6px;padding:3px 10px;}
  .choices{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:18px;}
  .choice{padding:11px 16px;border-radius:11px;border:2px solid var(--border);background:var(--surface);
    cursor:pointer;font-weight:700;font-size:0.92rem;transition:all .25s;display:flex;align-items:center;gap:9px;}
  .choice:hover{border-color:var(--accent4);background:rgba(124,159,255,.08);}
  .choice.selected{border-color:var(--accent4);background:rgba(124,159,255,.15);color:var(--accent4);}
  .choice.correct{border-color:var(--easy);background:rgba(110,231,183,.25);color:var(--easy);
    transform:scale(1.03);box-shadow:0 0 16px rgba(110,231,183,.35);font-weight:800;}
  .choice.try2{border-color:var(--accent2);background:rgba(255,107,107,.2);color:var(--accent2);
    animation:shake .5s ease;font-weight:800;}
  .choice.wrong{border-color:var(--accent2);background:rgba(255,107,107,.25);color:var(--accent2);font-weight:800;}
  .choice.correct-hint{border-color:var(--easy);background:rgba(110,231,183,.18);color:var(--easy);font-weight:800;}
  .choice-label{width:22px;height:22px;border-radius:50%;background:var(--border);
    display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;flex-shrink:0;}
  .choice.selected .choice-label{background:var(--accent4);color:#0e0e1a;}
  .choice.correct .choice-label{background:var(--easy);color:#0e0e1a;}
  .choice.correct-hint .choice-label{background:var(--easy);color:#0e0e1a;}
  .choice.try2 .choice-label,.choice.wrong .choice-label{background:var(--accent2);color:#fff;}
  .result-banner{display:none;align-items:center;gap:12px;padding:14px 18px;
    border-radius:12px;margin-top:14px;font-family:'Fredoka One';font-size:1.1rem;animation:fadeSlide .3s ease;}
  .result-banner.show{display:flex;}
  .result-banner.ok{background:rgba(110,231,183,.15);border:2px solid var(--easy);color:var(--easy);}
  .result-banner.try2{background:rgba(255,107,107,.1);border:2px solid var(--accent2);color:var(--accent2);}
  .result-banner.fail{background:rgba(255,107,107,.12);border:2px solid var(--accent2);color:var(--accent2);}
  .result-icon{font-size:1.8rem;}
  .card-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .btn-check{padding:10px 24px;border-radius:9px;border:none;
    background:linear-gradient(135deg,var(--accent4),#6366f1);color:#fff;
    font-family:'Nunito';font-weight:800;font-size:0.88rem;cursor:pointer;transition:all .2s;
    box-shadow:0 3px 12px rgba(124,159,255,.3);}
  .btn-check:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(124,159,255,.4);}
  .btn-show{padding:10px 20px;border-radius:9px;border:2px solid var(--border);background:transparent;
    color:var(--muted);font-family:'Nunito';font-weight:700;font-size:0.85rem;cursor:pointer;
    transition:all .2s;display:none;}
  .btn-show.unlocked{display:inline-flex;align-items:center;gap:6px;}
  .btn-show.unlocked:hover{border-color:var(--accent);color:var(--accent);}
  .answer-section{overflow:hidden;transition:max-height .5s ease;max-height:0;}
  .answer-section.visible{max-height:800px;}
  .answer-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-top:14px;}
  .answer-title{font-family:'Fredoka One';color:var(--easy);font-size:0.95rem;margin-bottom:8px;}
  .answer-text{color:var(--text);font-size:0.92rem;line-height:1.7;font-weight:600;}
  .answer-key{display:inline-block;margin-top:9px;padding:3px 14px;border-radius:999px;
    background:rgba(110,231,183,.2);color:var(--easy);font-weight:800;font-size:0.85rem;font-family:'JetBrains Mono';}
  .points-label{font-size:0.68rem;font-weight:800;letter-spacing:1px;padding:2px 7px;
    border-radius:4px;background:rgba(247,201,72,.1);color:var(--accent);border:1px solid rgba(247,201,72,.2);}
  .score-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(22,22,42,.95);
    border-top:1px solid var(--border);padding:10px 24px;display:flex;justify-content:center;
    align-items:center;gap:20px;z-index:100;backdrop-filter:blur(10px);flex-wrap:wrap;}
  .score-item{font-weight:700;font-size:0.85rem;}
  .score-item .val{font-family:'Fredoka One';font-size:1.1rem;}
  .score-item.correct .val{color:var(--easy);}
  .score-item.half .val{color:var(--medium);}
  .score-item.wrong .val{color:var(--hard);}
  .score-item.total .val{color:var(--accent);}
  .progress-bar{width:180px;height:5px;background:var(--border);border-radius:999px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--easy),var(--accent));
    border-radius:999px;transition:width .4s ease;}
  .empty-state{text-align:center;padding:60px 24px;color:var(--muted);}
  .empty-state .big-icon{font-size:56px;display:block;margin-bottom:14px;}
  .empty-state p{font-size:1rem;font-weight:600;}
</style>
</head>
<body>
<nav>
  <div class="nav-brand"><span>🦘</span> Math Kangaroo</div>
  <div class="nav-user">
    <div class="user-badge">
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userName">加载中...</span>
    </div>
    <button class="btn-nav" onclick="location.href='stats.html'">📊 我的统计</button>
    <button class="btn-nav" onclick="handleLogout()">退出</button>
  </div>
</nav>

<div class="stats-strip">
  <div class="stat-chip c">🌟 累计满分 <span class="val" id="totalCorrect">0</span> 题</div>
  <div class="stat-chip w">❌ 累计错误 <span class="val" id="totalWrong">0</span> 题</div>
  <div class="stat-chip r">🎯 正确率 <span class="val" id="overallRate">-</span></div>
  <div class="stat-chip t">⏱ 平均用时 <span class="val" id="avgTime">-</span> 秒/题</div>
</div>

<div class="controls">
  <div class="control-group">
    <label>题库级别</label>
    <div class="pill-group" id="levelGroup">
      <button class="pill active" data-level="3" onclick="setFilter('level','3')">Level 3–4</button>
      <button class="pill" data-level="56" onclick="setFilter('level','56')">Level 5–6</button>
      <button class="pill" data-level="all" onclick="setFilter('level','all')">全部</button>
    </div>
  </div>
  <div class="control-group">
    <label>难易程度</label>
    <div class="pill-group" id="diffGroup">
      <button class="pill active" data-diff="all" onclick="setFilter('diff','all')">全部</button>
      <button class="pill easy" data-diff="easy" onclick="setFilter('diff','easy')">⭐ 简单</button>
      <button class="pill medium" data-diff="medium" onclick="setFilter('diff','medium')">⭐⭐ 中等</button>
      <button class="pill hard" data-diff="hard" onclick="setFilter('diff','hard')">⭐⭐⭐ 困难</button>
    </div>
  </div>
  <div class="control-group">
    <label>年份</label>
    <div class="pill-group" id="yearGroup">
      <button class="pill active" data-year="all" onclick="setFilter('year','all')">全部</button>
      <button class="pill" data-year="2013" onclick="setFilter('year','2013')">2013</button>
      <button class="pill" data-year="2014" onclick="setFilter('year','2014')">2014</button>
      <button class="pill" data-year="2015" onclick="setFilter('year','2015')">2015</button>
      <button class="pill" data-year="2016" onclick="setFilter('year','2016')">2016</button>
      <button class="pill" data-year="2017" onclick="setFilter('year','2017')">2017</button>
      <button class="pill" data-year="2018" onclick="setFilter('year','2018')">2018</button>
      <button class="pill" data-year="2019" onclick="setFilter('year','2019')">2019</button>
      <button class="pill" data-year="2020" onclick="setFilter('year','2020')">2020</button>
      <button class="pill" data-year="2021" onclick="setFilter('year','2021')">2021</button>
      <button class="pill" data-year="2022" onclick="setFilter('year','2022')">2022</button>
    </div>
  </div>
  <div class="control-group">
    <label>题目数量</label>
    <div class="pill-group" id="countGroup">
      <button class="pill" data-count="10" onclick="setFilter('count','10')">10题</button>
      <button class="pill active" data-count="20" onclick="setFilter('count','20')">20题</button>
      <button class="pill" data-count="30" onclick="setFilter('count','30')">30题</button>
      <button class="pill" data-count="all" onclick="setFilter('count','all')">全部</button>
    </div>
  </div>
  <div class="control-group">
    <label>&nbsp;</label>
    <button class="btn-generate" onclick="generateQuiz()">🎯 开始练习</button>
  </div>
</div>

<div class="problem-area" id="problemArea">
  <div class="empty-state"><span class="big-icon">🦘</span><p>选择级别和难度，点击「开始练习」</p></div>
</div>

<div class="score-bar" id="scoreBar" style="display:none">
  <div class="score-item correct">🌟 <span class="val" id="correctCount">0</span> 满分</div>
  <div class="score-item half">⭐ <span class="val" id="halfCount">0</span> 半分</div>
  <div class="score-item wrong">❌ <span class="val" id="wrongCount">0</span> 错误</div>
  <div class="score-item total">共 <span class="val" id="totalCount">0</span> 题</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<script>
// ── Supabase ──
const SURL='https://fsxryejdnemypspnxfkz.supabase.co';
const SKEY='sb_publishable_GbqihuzVApj7Cygd0o50qg_Q3DRSlW3';
const sb=supabase.createClient(SURL,SKEY);
let currentUser=null;

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  currentUser=session.user;
  const name=currentUser.user_metadata?.name||currentUser.email;
  document.getElementById('userAvatar').textContent=name[0].toUpperCase();
  document.getElementById('userName').textContent=name;
  await loadStats();
})();

async function loadStats(){
  if(!currentUser)return;
  const {data}=await sb.from('profiles').select('total_answered,total_correct,total_time').eq('id',currentUser.id).single();
  if(!data)return;
  const ans=data.total_answered||0, cor=data.total_correct||0;
  document.getElementById('totalCorrect').textContent=cor;
  document.getElementById('totalWrong').textContent=ans-cor;
  document.getElementById('overallRate').textContent=ans>0?Math.round(cor/ans*100)+'%':'-';
  document.getElementById('avgTime').textContent=data.total_time&&ans>0?(data.total_time/ans).toFixed(1):'-';
}

async function recordAnswer(qid,year,diff,isCorrect,timeTaken,attemptNum){
  if(!currentUser)return;
  await sb.from('answers').insert({
    user_id:currentUser.id,question_id:qid,year,difficulty:diff,
    is_correct:isCorrect,attempt_number:attemptNum,time_taken:timeTaken
  });
  // update aggregate
  const inc={total_answered:1,total_time:timeTaken};
  if(isCorrect) inc.total_correct=1;
  const {data:p}=await sb.from('profiles').select('total_answered,total_correct,total_time').eq('id',currentUser.id).single();
  if(p){
    await sb.from('profiles').update({
      total_answered:(p.total_answered||0)+1,
      total_correct:(p.total_correct||0)+(isCorrect?1:0),
      total_time:(p.total_time||0)+timeTaken
    }).eq('id',currentUser.id);
  }
  await loadStats();
}

async function handleLogout(){
  await sb.auth.signOut();
  location.href='index.html';
}
</script>

<script>
let filters={level:'3',diff:'all',year:'all',count:'20'};
let currentQuestions=[],answers={},revealed={},attempts={},questionTimers={};
let score={correct:0,halfCorrect:0,wrong:0};

function setFilter(type,val){
  filters[type]=val;
  const g=type==='level'?'levelGroup':type==='diff'?'diffGroup':type==='year'?'yearGroup':'countGroup';
  document.querySelectorAll(`#${g} .pill`).forEach(p=>p.classList.toggle('active',p.dataset[type]===val));
}

function generateQuiz(){
  answers={};revealed={};attempts={};questionTimers={};
  score={correct:0,halfCorrect:0,wrong:0};
  let pool=filters.level==='3'?[...QUESTIONS]:filters.level==='56'?[...QUESTIONS56]:[...QUESTIONS,...QUESTIONS56];
  if(filters.diff!=='all') pool=pool.filter(q=>q.difficulty===filters.diff);
  if(filters.year!=='all') pool=pool.filter(q=>q.year===parseInt(filters.year));
  pool.sort(()=>Math.random()-.5);
  if(filters.count!=='all') pool=pool.slice(0,parseInt(filters.count));
  currentQuestions=pool;
  renderProblems();updateScoreBar();
  document.getElementById('scoreBar').style.display=pool.length>0?'flex':'none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderProblems(){
  const area=document.getElementById('problemArea');
  if(!currentQuestions.length){
    area.innerHTML='<div class="empty-state"><span class="big-icon">🤔</span><p>没有找到符合条件的题目</p></div>';return;
  }
  const dl={easy:'⭐ 简单',medium:'⭐⭐ 中等',hard:'⭐⭐⭐ 困难'};
  const L=['A','B','C','D','E'];
  area.innerHTML=currentQuestions.map((q,idx)=>{
    const choices=q.choices.map((c,ci)=>{
      const txt=c.replace(/^[A-E]\) /,'');
      return `<div class="choice" id="choice-${q.id}-${ci}" onclick="selectChoice(${q.id},${ci})">
        <span class="choice-label">${L[ci]}</span><span>${txt}</span></div>`;
    }).join('');
    const lvTag=q.id>300?'<span class="tag lv">Lv 5-6</span>':'<span class="tag lv">Lv 3-4</span>';
    const pts=q.difficulty==='easy'?'3':q.difficulty==='medium'?'4':'5';
    return `<div class="problem-card ${q.difficulty}" id="card-${q.id}" style="animation-delay:${idx*.04}s">
      <div class="problem-header">
        <span class="problem-num">Q${idx+1}</span>
        <div class="meta">
          ${lvTag}
          <span class="tag year">${q.year}</span>
          <span class="tag ${q.difficulty}">${dl[q.difficulty]}</span>
          <span class="points-label">${pts}分</span>
          <span class="timer-badge" id="timer-${q.id}">⏱ --s</span>
        </div>
      </div>
      <div class="problem-text">${q.text.replace(/\n/g,'<br>')}</div>
      <div class="choices">${choices}</div>
      <div class="result-banner" id="result-${q.id}">
        <span class="result-icon" id="rico-${q.id}"></span>
        <span id="rtxt-${q.id}"></span>
      </div>
      <div class="card-actions">
        <button class="btn-check" id="btnc-${q.id}" onclick="checkAnswer(${q.id})">✔ 提交答案</button>
        <button class="btn-show" id="btns-${q.id}" onclick="toggleSolution(${q.id})">💡 查看解析</button>
      </div>
      <div class="answer-section" id="ans-${q.id}">
        <div class="answer-box">
          <div class="answer-title">✅ 解题过程</div>
          <div class="answer-text">${q.solution}</div>
          <div class="answer-key">正确答案: ${L[q.answer]})</div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Intersection observer for timers
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=parseInt(e.target.id.replace('card-',''));
        if(!questionTimers[id])questionTimers[id]=Date.now();
        startTimer(id);obs.unobserve(e.target);
      }
    });
  },{threshold:0.3});
  currentQuestions.forEach(q=>{const c=document.getElementById(`card-${q.id}`);if(c)obs.observe(c);});
}

const timerIv={};
function startTimer(qid){
  if(timerIv[qid])return;
  timerIv[qid]=setInterval(()=>{
    if(!questionTimers[qid]||revealed[qid]){clearInterval(timerIv[qid]);return;}
    const el=document.getElementById(`timer-${qid}`);
    if(el)el.textContent=`⏱ ${Math.floor((Date.now()-questionTimers[qid])/1000)}s`;
  },1000);
}

function selectChoice(qid,ci){
  if(revealed[qid])return;
  if(!questionTimers[qid])questionTimers[qid]=Date.now();
  const prev=answers[qid];
  if(prev!==undefined){
    const pe=document.getElementById(`choice-${qid}-${prev}`);
    if(pe){pe.classList.remove('selected');}
  }
  answers[qid]=ci;
  const el=document.getElementById(`choice-${qid}-${ci}`);
  if(el){el.classList.remove('try2');el.classList.add('selected');}
}

function checkAnswer(qid){
  if(answers[qid]===undefined){
    const card=document.getElementById(`card-${qid}`);
    card.style.animation='none';card.offsetHeight;card.style.animation='shake .5s ease';
    setTimeout(()=>card.style.animation='',500);return;
  }
  if(revealed[qid])return;
  const q=currentQuestions.find(q=>q.id===qid);
  const sel=answers[qid],cor=q.answer,ok=sel===cor;
  const L=['A','B','C','D','E'];
  if(!attempts[qid])attempts[qid]=0;
  const banner=document.getElementById(`result-${qid}`);
  const rico=document.getElementById(`rico-${qid}`);
  const rtxt=document.getElementById(`rtxt-${qid}`);
  const btnc=document.getElementById(`btnc-${qid}`);
  const btns=document.getElementById(`btns-${qid}`);

  if(ok){
    // ── 答对 ──
    revealed[qid]=true;
    const t=questionTimers[qid]?Math.floor((Date.now()-questionTimers[qid])/1000):0;
    const tel=document.getElementById(`timer-${qid}`);if(tel)tel.textContent=`⏱ ${t}s`;
    for(let i=0;i<q.choices.length;i++){
      const el=document.getElementById(`choice-${qid}-${i}`);
      if(!el)continue;
      el.classList.remove('selected','try2');el.style.cursor='default';el.onclick=null;
      if(i===cor)el.classList.add('correct');
    }
    banner.className='result-banner show ok';
    rico.textContent=attempts[qid]===0?'🎉':'👍';
    rtxt.textContent=attempts[qid]===0?'一次答对！满分！🌟':'第二次答对！半分，继续加油！';
    if(btnc)btnc.style.display='none';
    if(btns)btns.classList.add('unlocked');
    if(attempts[qid]===0)score.correct++;else score.halfCorrect++;
    updateScoreBar();
    if(typeof recordAnswer==='function')recordAnswer(qid,q.year,q.difficulty,true,t,attempts[qid]+1);
  } else {
    // ── 答错 ──
    attempts[qid]++;
    const wrongEl=document.getElementById(`choice-${qid}-${sel}`);
    if(wrongEl){
      wrongEl.classList.remove('selected');
      wrongEl.classList.add('try2');
      wrongEl.style.animation='none';wrongEl.offsetHeight;wrongEl.style.animation='shake .5s ease';
    }
    if(attempts[qid]<2){
      // 第1次错
      banner.className='result-banner show try2';
      rico.textContent='❌';
      rtxt.textContent='答错了！还有一次机会，重新选一个吧！';
      answers[qid]=undefined;
      if(btnc)btnc.textContent='🔄 再提交一次';
    } else {
      // 第2次错，揭晓
      revealed[qid]=true;
      const t=questionTimers[qid]?Math.floor((Date.now()-questionTimers[qid])/1000):0;
      const tel=document.getElementById(`timer-${qid}`);if(tel)tel.textContent=`⏱ ${t}s`;
      for(let i=0;i<q.choices.length;i++){
        const el=document.getElementById(`choice-${qid}-${i}`);
        if(!el)continue;
        el.style.cursor='default';el.onclick=null;el.classList.remove('selected','try2');
        if(i===cor)el.classList.add('correct-hint');
        else if(i===sel)el.classList.add('wrong');
      }
      banner.className='result-banner show fail';
      rico.textContent='😓';
      rtxt.textContent=`两次都错了！正确答案是 ${L[cor]}，看看解析吧！`;
      if(btnc)btnc.style.display='none';
      if(btns)btns.classList.add('unlocked');
      setTimeout(()=>{
        document.getElementById(`ans-${qid}`)?.classList.add('visible');
        if(btns)btns.textContent='🙈 收起解析';
      },500);
      score.wrong++;updateScoreBar();
      if(typeof recordAnswer==='function')recordAnswer(qid,q.year,q.difficulty,false,t,2);
    }
  }
}

function toggleSolution(qid){
  const sec=document.getElementById(`ans-${qid}`);
  const btn=document.getElementById(`btns-${qid}`);
  if(!sec)return;
  const open=!sec.classList.contains('visible');
  sec.classList.toggle('visible',open);
  if(btn)btn.textContent=open?'🙈 收起解析':'💡 查看解析';
}

function updateScoreBar(){
  const total=currentQuestions.length;
  const done=Object.keys(revealed).filter(k=>revealed[k]).length;
  document.getElementById('correctCount').textContent=score.correct;
  document.getElementById('halfCount').textContent=score.halfCorrect;
  document.getElementById('wrongCount').textContent=score.wrong;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('progressFill').style.width=(total>0?done/total*100:0)+'%';
}
</script>
