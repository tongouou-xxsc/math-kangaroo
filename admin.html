<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Kangaroo · 管理后台</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0e0e1a;--surface:#16162a;--card:#1e1e38;--border:#2e2e55;
    --accent:#f7c948;--accent2:#ff6b6b;--accent4:#7c9fff;--text:#e8e8f0;--muted:#888899;--easy:#6ee7b7;--medium:#f7c948;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;
    background:rgba(22,22,42,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);z-index:20;}
  .nav-brand{font-family:'Fredoka One';font-size:1.2rem;color:var(--accent);display:flex;align-items:center;gap:8px;}
  .btn-nav{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-family:'Nunito';font-weight:700;font-size:0.8rem;cursor:pointer;transition:all .2s;}
  .btn-nav:hover{border-color:var(--accent4);color:var(--accent4);}
  .layout{display:flex;flex:1;}
  .sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;}
  .sidebar-item{display:block;padding:11px 20px;font-weight:700;font-size:0.88rem;cursor:pointer;
    color:var(--muted);transition:all .2s;border-left:3px solid transparent;}
  .sidebar-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
  .sidebar-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(247,201,72,.06);}
  .main{flex:1;padding:28px;overflow-y:auto;}
  h2{font-family:'Fredoka One';font-size:1.5rem;color:var(--accent);margin-bottom:22px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
  .kpi .label{font-size:0.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .kpi .val{font-family:'Fredoka One';font-size:1.9rem;}
  .kpi.c .val{color:var(--easy);}.kpi.w .val{color:var(--accent2);}.kpi.r .val{color:var(--accent);}.kpi.t .val{color:var(--accent4);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
  .card-title{font-family:'Fredoka One';font-size:1rem;color:var(--text);margin-bottom:14px;}
  table{width:100%;border-collapse:collapse;font-size:0.85rem;}
  th{padding:8px 12px;text-align:left;font-size:0.7rem;font-weight:800;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid rgba(46,46,85,.5);font-weight:600;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:0.72rem;font-weight:800;}
  .badge.ok{background:rgba(110,231,183,.15);color:var(--easy);}
  .badge.half{background:rgba(247,201,72,.15);color:var(--medium);}
  .badge.fail{background:rgba(255,107,107,.15);color:var(--accent2);}
  .search-box{padding:9px 14px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);font-family:'Nunito';font-size:0.88rem;
    width:260px;outline:none;margin-bottom:14px;}
  .search-box:focus{border-color:var(--accent4);}
  .page-tab{display:none;}.page-tab.active{display:block;}
  .bar-mini{height:6px;background:var(--border);border-radius:999px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-left:6px;}
  .bar-mini-fill{height:100%;background:var(--easy);border-radius:999px;}
  .loading{color:var(--muted);font-weight:700;padding:32px;text-align:center;}
  .rank-medal{font-size:1.1rem;}
  .btn-detail{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;
    color:var(--accent4);font-family:'Nunito';font-weight:700;font-size:0.78rem;cursor:pointer;transition:all .2s;}
  .btn-detail:hover{border-color:var(--accent4);background:rgba(124,159,255,.1);}
  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;}
  .modal h3{font-family:'Fredoka One';color:var(--accent);margin-bottom:16px;}
  .close-btn{float:right;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;margin-top:-4px;}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">🦘 管理后台</div>
  <button class="btn-nav" onclick="handleLogout()">退出</button>
</nav>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-item active" onclick="showTab('overview')">📊 数据总览</div>
    <div class="sidebar-item" onclick="showTab('students')">👥 学生管理</div>
    <div class="sidebar-item" onclick="showTab('leaderboard')">🏆 正确率排行</div>
    <div class="sidebar-item" onclick="showTab('activity')">📋 答题记录</div>
  </div>
  <div class="main" id="main"><div class="loading">加载中...</div></div>
</div>

<!-- 学生详情 modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h3 id="modalTitle">学生详情</h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const SURL='https://fsxryejdnemypspnxfkz.supabase.co';
const SKEY='sb_publishable_GbqihuzVApj7Cygd0o50qg_Q3DRSlW3';
const sb=supabase.createClient(SURL,SKEY);
let allProfiles=[], allAnswers=[], currentTab='overview';

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  // check admin via user_metadata (bypasses RLS)
  const {data:{user}} = await sb.auth.getUser();
  const isAdmin = user?.user_metadata?.role === 'admin';
  if(!isAdmin){location.href='practice.html';return;}
  await loadData();
  renderTab('overview');
})();

async function loadData(){
  const [{data:p},{data:a}]=await Promise.all([
    sb.from('profiles').select('*').neq('role','admin').order('created_at',{ascending:false}),
    sb.from('answers').select('*').order('created_at',{ascending:false}).limit(500)
  ]);
  allProfiles=p||[]; allAnswers=a||[];
}

async function handleLogout(){await sb.auth.signOut();location.href='index.html';}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.sidebar-item').forEach((el,i)=>{
    el.classList.toggle('active',['overview','students','leaderboard','activity'][i]===tab);
  });
  renderTab(tab);
}

function renderTab(tab){
  const main=document.getElementById('main');
  if(tab==='overview') main.innerHTML=renderOverview();
  else if(tab==='students') main.innerHTML=renderStudents();
  else if(tab==='leaderboard') main.innerHTML=renderLeaderboard();
  else if(tab==='activity') main.innerHTML=renderActivity();
}

function renderOverview(){
  const totalStudents=allProfiles.length;
  const totalAnswers=allAnswers.length;
  const totalCorrect=allAnswers.filter(a=>a.is_correct).length;
  const rate=totalAnswers>0?Math.round(totalCorrect/totalAnswers*100):0;
  const avgT=totalAnswers>0?(allAnswers.reduce((s,a)=>s+(a.time_taken||0),0)/totalAnswers).toFixed(1):'-';

  // visitor stats
  const now=new Date();
  const day1=new Date(now-864e5).toISOString();
  const day7=new Date(now-7*864e5).toISOString();
  const totalVisitors=allVisitors.length;
  const todayActive=allVisitors.filter(v=>v.last_seen>day1).length;
  const weekActive=allVisitors.filter(v=>v.last_seen>day7).length;
  const anonAnswers=allAnonAnswers.length;
  const totalAllAnswers=totalAnswers+anonAnswers;

  // year chart (combined registered + anon)
  const years=[2013,2014,2015,2016,2017,2018,2019,2020,2021,2022];
  const allCombined=[...allAnswers,...allAnonAnswers];
  const maxCount=Math.max(...years.map(y=>allCombined.filter(a=>a.year===y).length),1);
  const bars=years.map(y=>{
    const ya=allCombined.filter(a=>a.year===y);
    const pct=Math.round(ya.length/maxCount*100);
    const rp=ya.length>0?Math.round(ya.filter(a=>a.is_correct).length/ya.length*100):0;
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="width:36px;font-size:.8rem;color:var(--muted);font-weight:700">${y}</span>
      <div style="flex:1;height:10px;background:var(--border);border-radius:999px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent4),var(--easy));border-radius:999px"></div>
      </div>
      <span style="width:80px;font-size:.8rem;font-weight:700;color:var(--muted)">${ya.length}题 · ${rp}%</span>
    </div>`;
  }).join('');

  return `<h2>📊 数据总览</h2>
    <div style="margin-bottom:10px;font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase">注册用户</div>
    <div class="kpi-grid" style="margin-bottom:20px">
      <div class="kpi c"><div class="label">注册学生</div><div class="val">${totalStudents}</div></div>
      <div class="kpi t"><div class="label">答题数</div><div class="val">${totalAnswers}</div></div>
      <div class="kpi r"><div class="label">正确率</div><div class="val">${rate}%</div></div>
      <div class="kpi w"><div class="label">平均用时</div><div class="val">${avgT}s</div></div>
    </div>
    <div style="margin-bottom:10px;font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase">访客流量</div>
    <div class="kpi-grid" style="margin-bottom:24px">
      <div class="kpi" style="border-color:rgba(192,132,252,.3)"><div class="label">总访客</div><div class="val" style="color:#c084fc">${totalVisitors}</div></div>
      <div class="kpi" style="border-color:rgba(247,201,72,.3)"><div class="label">今日活跃</div><div class="val" style="color:#f7c948">${todayActive}</div></div>
      <div class="kpi" style="border-color:rgba(124,159,255,.3)"><div class="label">7日活跃</div><div class="val" style="color:#7c9fff">${weekActive}</div></div>
      <div class="kpi" style="border-color:rgba(110,231,183,.3)"><div class="label">访客答题数</div><div class="val" style="color:#6ee7b7">${anonAnswers}</div></div>
    </div>
    <div class="card">
      <div class="card-title">📅 各年份答题情况（注册+访客合计：${totalAllAnswers} 题）</div>
      ${bars}
    </div>`;
}

function renderStudents(){
  const q=()=>document.getElementById('stuSearch')?.value.toLowerCase()||'';
  const rows=allProfiles.filter(p=>p.name?.toLowerCase().includes(q())||p.email?.toLowerCase().includes(q()))
    .map(p=>{
      const pa=allAnswers.filter(a=>a.user_id===p.id);
      const pc=pa.filter(a=>a.is_correct).length;
      const rate=pa.length>0?Math.round(pc/pa.length*100):'-';
      return `<tr>
        <td>${p.name||'-'}</td>
        <td style="color:var(--muted)">${p.email||'-'}</td>
        <td>${pa.length}</td>
        <td>${pc}</td>
        <td>${rate}${typeof rate==='number'?'%':''}</td>
        <td><button class="btn-detail" onclick='showStudent(${JSON.stringify(p.id)})'>详情</button></td>
      </tr>`;
    }).join('');
  return `<h2>👥 学生管理</h2>
    <input class="search-box" id="stuSearch" placeholder="🔍 搜索姓名/邮箱" oninput="document.getElementById('main').innerHTML=renderStudents()">
    <div class="card">
      <table>
        <thead><tr><th>姓名</th><th>邮箱</th><th>答题数</th><th>答对</th><th>正确率</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--muted)">暂无学生</td></tr>'}</tbody>
      </table>
    </div>`;
}

function renderLeaderboard(){
  const ranked=allProfiles
    .map(p=>{
      const pa=allAnswers.filter(a=>a.user_id===p.id);
      const pc=pa.filter(a=>a.is_correct).length;
      return {...p,_total:pa.length,_correct:pc,_rate:pa.length>=10?pc/pa.length:null};
    })
    .filter(p=>p._rate!==null)
    .sort((a,b)=>b._rate-a._rate);

  const medals=['🥇','🥈','🥉'];
  const rows=ranked.map((p,i)=>`<tr>
    <td>${medals[i]||`#${i+1}`}</td>
    <td>${p.name||'-'}</td>
    <td>${p._total}</td>
    <td>${p._correct}</td>
    <td><strong style="color:var(--easy)">${Math.round(p._rate*100)}%</strong>
      <span class="bar-mini"><span class="bar-mini-fill" style="width:${Math.round(p._rate*100)}%"></span></span>
    </td>
  </tr>`).join('');

  return `<h2>🏆 正确率排行榜</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:16px">至少答题10题才上榜</p>
    <div class="card">
      <table>
        <thead><tr><th>排名</th><th>姓名</th><th>答题数</th><th>答对</th><th>正确率</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">暂无数据</td></tr>'}</tbody>
      </table>
    </div>`;
}

function renderActivity(){
  const rows=allAnswers.slice(0,50).map(a=>{
    const p=allProfiles.find(p=>p.id===a.user_id);
    const d=new Date(a.created_at);
    const dstr=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const badge=a.is_correct
      ?(a.attempt_number===1?'<span class="badge ok">满分</span>':'<span class="badge half">半分</span>')
      :'<span class="badge fail">错误</span>';
    return `<tr>
      <td>${dstr}</td>
      <td>${p?.name||'未知'}</td>
      <td>${a.year}</td>
      <td>${a.difficulty==='easy'?'简单':a.difficulty==='medium'?'中等':'困难'}</td>
      <td>${badge}</td>
      <td>${a.time_taken||0}s</td>
    </tr>`;
  }).join('');

  return `<h2>📋 最近答题记录</h2>
    <div class="card">
      <table>
        <thead><tr><th>时间</th><th>学生</th><th>年份</th><th>难度</th><th>结果</th><th>用时</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--muted)">暂无记录</td></tr>'}</tbody>
      </table>
    </div>`;
}

function showStudent(uid){
  const p=allProfiles.find(p=>p.id===uid);
  if(!p)return;
  const pa=allAnswers.filter(a=>a.user_id===uid);
  const pc=pa.filter(a=>a.is_correct).length;
  const rate=pa.length>0?Math.round(pc/pa.length*100):0;
  const years=[2013,2014,2015,2016,2017,2018,2019,2020,2021,2022];
  const yrows=years.map(y=>{
    const ya=pa.filter(a=>a.year===y);
    const yc=ya.filter(a=>a.is_correct).length;
    const rp=ya.length>0?Math.round(yc/ya.length*100):0;
    return ya.length>0?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:36px;font-size:.8rem;color:var(--muted)">${y}</span>
      <div style="flex:1;height:7px;background:var(--border);border-radius:999px;overflow:hidden">
        <div style="height:100%;width:${rp}%;background:var(--easy);border-radius:999px"></div>
      </div>
      <span style="font-size:.78rem;color:var(--muted)">${ya.length}题 ${rp}%</span>
    </div>`:'';
  }).join('');

  document.getElementById('modalTitle').textContent=p.name||p.email;
  document.getElementById('modalBody').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      <div style="background:var(--surface);border-radius:10px;padding:12px;text-align:center">
        <div style="color:var(--muted);font-size:.72rem;font-weight:800;letter-spacing:1px;margin-bottom:4px">答题数</div>
        <div style="font-family:'Fredoka One';font-size:1.5rem;color:var(--accent4)">${pa.length}</div>
      </div>
      <div style="background:var(--surface);border-radius:10px;padding:12px;text-align:center">
        <div style="color:var(--muted);font-size:.72rem;font-weight:800;letter-spacing:1px;margin-bottom:4px">答对</div>
        <div style="font-family:'Fredoka One';font-size:1.5rem;color:var(--easy)">${pc}</div>
      </div>
      <div style="background:var(--surface);border-radius:10px;padding:12px;text-align:center">
        <div style="color:var(--muted);font-size:.72rem;font-weight:800;letter-spacing:1px;margin-bottom:4px">正确率</div>
        <div style="font-family:'Fredoka One';font-size:1.5rem;color:var(--accent)">${rate}%</div>
      </div>
    </div>
    <div style="font-family:'Fredoka One';font-size:.9rem;margin-bottom:10px;color:var(--muted)">各年份表现</div>
    ${yrows||'<div style="color:var(--muted);font-size:.85rem">暂无数据</div>'}`;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
</script>
</body>
</html>
