<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Kangaroo · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e1a; --surface: #16162a; --card: #1e1e38;
    --border: #2e2e55; --accent: #f7c948; --accent2: #ff6b6b;
    --accent4: #7c9fff; --text: #e8e8f0; --muted: #888899;
    --easy: #6ee7b7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(124,159,255,.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(247,201,72,.08) 0%, transparent 60%);
  }
  .container { width: 100%; max-width: 420px; padding: 24px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo .icon { font-size: 56px; display: block; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .logo h1 { font-family: 'Fredoka One'; font-size: 2rem; color: var(--accent);
    text-shadow: 0 0 30px rgba(247,201,72,.4); margin-top: 8px; }
  .logo p { color: var(--muted); font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--surface);
    border-radius: 10px; padding: 4px; }
  .tab { flex: 1; padding: 9px; border-radius: 7px; border: none; cursor: pointer;
    font-family: 'Nunito'; font-weight: 800; font-size: 0.9rem; transition: all .2s;
    background: transparent; color: var(--muted); }
  .tab.active { background: var(--accent); color: #0e0e1a; }

  .form { display: flex; flex-direction: column; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.75rem; font-weight: 800; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); }
  .form-group input {
    padding: 12px 16px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--surface); color: var(--text); font-family: 'Nunito';
    font-size: 0.95rem; font-weight: 600; transition: border-color .2s; outline: none;
  }
  .form-group input:focus { border-color: var(--accent4); }
  .btn-primary {
    padding: 13px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #f7c948, #ff9a3c);
    color: #0e0e1a; font-family: 'Fredoka One'; font-size: 1.1rem;
    cursor: pointer; transition: all .2s; margin-top: 4px;
    box-shadow: 0 4px 20px rgba(247,201,72,.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(247,201,72,.4); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .error { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3);
    border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--accent2);
    font-weight: 700; display: none; }
  .error.show { display: block; }
  .success { background: rgba(110,231,183,.1); border: 1px solid rgba(110,231,183,.3);
    border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--easy);
    font-weight: 700; display: none; }
  .success.show { display: block; }

  .divider { text-align: center; color: var(--muted); font-size: 0.8rem; font-weight: 700;
    margin: 4px 0; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%;
    width: 40%; height: 1px; background: var(--border); }
  .divider::before { left: 0; } .divider::after { right: 0; }

  .loading { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,.3);
    border-top-color: #0e0e1a; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span class="icon">🦘</span>
    <h1>Math Kangaroo</h1>
    <p>Level 3 · 2013–2022</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">登 录</button>
      <button class="tab" onclick="switchTab('register')">注 册</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form">
      <div id="loginError" class="error"></div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn-primary" onclick="handleLogin()" id="loginBtn">登 录</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="form" style="display:none">
      <div id="registerError" class="error"></div>
      <div id="registerSuccess" class="success"></div>
      <div class="form-group">
        <label>昵称（小朋友的名字）</label>
        <input type="text" id="regName" placeholder="例如：小明" />
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>密码（至少6位）</label>
        <input type="password" id="regPassword" placeholder="••••••••" />
      </div>
      <button class="btn-primary" onclick="handleRegister()" id="registerBtn">创 建 账 号</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ⚠️ 替换为你的 Firebase 配置
  const firebaseConfig = {
    apiKey: "AIzaSyBDoFjVpeJKtnemdu9SxcRCLb5eAKQsSzg",
    authDomain: "math-kangaroo.firebaseapp.com",
    projectId: "math-kangaroo",
    storageBucket: "math-kangaroo.firebasestorage.app",
    messagingSenderId: "1029665532854",
    appId: "1:1029665532854:web:fbd579ea6de4065cf6af17"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Auto redirect if already logged in
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists() && snap.data().role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'practice.html';
      }
    }
  });

  window.handleLogin = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');
    if (!email || !password) { showErr(errEl, '请填写邮箱和密码'); return; }
    btn.innerHTML = '<span class="loading"></span>';
    btn.disabled = true;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      showErr(errEl, getErrMsg(e.code));
      btn.textContent = '登 录'; btn.disabled = false;
    }
  };

  window.handleRegister = async () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const btn = document.getElementById('registerBtn');
    const errEl = document.getElementById('registerError');
    errEl.classList.remove('show');
    if (!name || !email || !password) { showErr(errEl, '请填写所有字段'); return; }
    if (password.length < 6) { showErr(errEl, '密码至少需要6位'); return; }
    btn.innerHTML = '<span class="loading"></span>'; btn.disabled = true;
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), {
        name, email, role: 'student',
        createdAt: new Date().toISOString(),
        stats: { totalAnswered: 0, totalCorrect: 0, totalTime: 0 }
      });
    } catch(e) {
      showErr(errEl, getErrMsg(e.code));
      btn.textContent = '创 建 账 号'; btn.disabled = false;
    }
  };

  function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }
  function getErrMsg(code) {
    const msgs = {
      'auth/user-not-found': '账号不存在',
      'auth/wrong-password': '密码错误',
      'auth/email-already-in-use': '该邮箱已注册',
      'auth/invalid-email': '邮箱格式不正确',
      'auth/weak-password': '密码强度太弱',
      'auth/too-many-requests': '尝试次数过多，请稍后再试',
      'auth/invalid-credential': '邮箱或密码错误',
    };
    return msgs[code] || '操作失败，请重试';
  }
</script>
<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0)===( tab==='login')));
    document.getElementById('loginForm').style.display = tab === 'login' ? 'flex' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
  }
</script>
</body>
</html>
