<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="袋鼠数学">
<meta name="theme-color" content="#0e0e1a">
<title>袋鼠数学 · 统计</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0e0e1a;--surface:#16162a;--card:#1e1e38;--border:#2e2e55;
    --accent:#f7c948;--accent2:#ff6b6b;--accent4:#7c9fff;--text:#e8e8f0;--muted:#888899;--easy:#6ee7b7;--medium:#f7c948;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;
    background:rgba(22,22,42,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);}
  .nav-brand{font-family:'Fredoka One';font-size:1.2rem;color:var(--accent);display:flex;align-items:center;gap:8px;}
  .btn-nav{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-family:'Nunito';font-weight:700;font-size:0.8rem;cursor:pointer;transition:all .2s;}
  .btn-nav:hover{border-color:var(--accent4);color:var(--accent4);}
  .page{max-width:900px;margin:0 auto;padding:32px 24px;}
  h2{font-family:'Fredoka One';font-size:1.6rem;color:var(--accent);margin-bottom:24px;}
  .big-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px;}
  .stat-card .label{font-size:0.72rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .stat-card .val{font-family:'Fredoka One';font-size:2rem;}
  .stat-card.c .val{color:var(--easy);}
  .stat-card.w .val{color:var(--accent2);}
  .stat-card.r .val{color:var(--accent);}
  .stat-card.t .val{color:var(--accent4);}
  .section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;}
  .section-title{font-family:'Fredoka One';font-size:1.1rem;color:var(--text);margin-bottom:16px;}
  .year-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .year-label{width:38px;font-family:'Fredoka One';font-size:0.85rem;color:var(--muted);}
  .bar-wrap{flex:1;display:flex;flex-direction:column;gap:4px;}
  .bar-bg{height:8px;background:var(--border);border-radius:999px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;transition:width .6s ease;}
  .bar-cov .bar-fill{background:var(--accent4);}
  .bar-rate .bar-fill{background:var(--easy);}
  .bar-meta{display:flex;justify-content:space-between;font-size:0.72rem;font-weight:700;color:var(--muted);}
  .diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .diff-card{background:var(--surface);border-radius:12px;padding:14px;text-align:center;}
  .diff-card .d-name{font-size:0.75rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;color:var(--muted);}
  .diff-card .d-rate{font-family:'Fredoka One';font-size:1.6rem;}
  .diff-card.easy .d-rate{color:var(--easy);}
  .diff-card.medium .d-rate{color:var(--medium);}
  .diff-card.hard .d-rate{color:var(--accent2);}
  table{width:100%;border-collapse:collapse;font-size:0.85rem;}
  th{padding:8px 12px;text-align:left;font-size:0.7rem;font-weight:800;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid rgba(46,46,85,.5);font-weight:600;}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:0.72rem;font-weight:800;}
  .badge.ok{background:rgba(110,231,183,.15);color:var(--easy);}
  .badge.half{background:rgba(247,201,72,.15);color:var(--medium);}
  .badge.fail{background:rgba(255,107,107,.15);color:var(--accent2);}
  .loading{text-align:center;padding:48px;color:var(--muted);font-size:1.1rem;font-weight:700;}

  /* ── MOBILE ── */
  @media(max-width:600px){
    nav{padding:10px 14px;}
    .nav-brand{font-size:1rem;}
    .btn-nav{padding:6px 10px;font-size:0.75rem;}
    .page{padding:20px 14px;}
    h2{font-size:1.3rem;margin-bottom:16px;}
    .big-stats{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
    .stat-card{padding:14px 16px;border-radius:12px;}
    .stat-card .val{font-size:1.6rem;}
    .section{padding:16px 14px;border-radius:14px;margin-bottom:14px;}
    .diff-grid{gap:8px;}
    .diff-card{padding:12px 8px;}
    .diff-card .d-rate{font-size:1.3rem;}
    /* table -> card list on mobile */
    table{display:block;}
    thead{display:none;}
    tbody{display:flex;flex-direction:column;gap:8px;}
    tr{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;
      background:var(--surface);border-radius:10px;padding:10px 12px;border-bottom:none!important;}
    td{padding:0;border-bottom:none;font-size:0.82rem;}
    td:first-child{grid-column:1/3;color:var(--muted);font-size:0.75rem;}
    td:nth-child(4){grid-column:1/3;}
    .year-label{font-size:0.78rem;}
  }
  @supports(padding:max(0px)){
    nav{padding-top:max(12px,env(safe-area-inset-top));}
  }
  *{-webkit-tap-highlight-color:transparent;}
</style>
<link rel="manifest" href="manifest.json">
</head>
<body>
<nav>
  <div class="nav-brand">🦘 Math Kangaroo</div>
  <div style="display:flex;gap:10px">
    <button class="btn-nav" onclick="location.href='practice.html'">← 返回练习</button>
    <button class="btn-nav" onclick="handleLogout()">退出</button>
  </div>
</nav>
<div class="page">
  <h2>📊 我的学习统计</h2>
  <div id="content"><div class="loading">加载中...</div></div>
</div>

<script>
const SURL='https://fsxryejdnemypspnxfkz.supabase.co';
const SKEY='sb_publishable_GbqihuzVApj7Cygd0o50qg_Q3DRSlW3';
const sb=supabase.createClient(SURL,SKEY);
let currentUser=null;

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  currentUser=session.user;
  await loadAll();
})();

async function handleLogout(){await sb.auth.signOut();location.href='index.html';}

async function loadAll(){
  // fetch profile + all answers
  const [{data:prof},{data:ans}]=await Promise.all([
    sb.from('profiles').select('*').eq('id',currentUser.id).single(),
    sb.from('answers').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false})
  ]);
  renderPage(prof||{}, ans||[]);
}

function renderPage(prof, ans){
  const total=ans.length;
  const correct=ans.filter(a=>a.is_correct).length;
  const wrong=total-correct;
  const rate=total>0?Math.round(correct/total*100):0;
  const avgT=total>0?(ans.reduce((s,a)=>s+(a.time_taken||0),0)/total).toFixed(1):'-';

  // year breakdown
  const years=[2013,2014,2015,2016,2017,2018,2019,2020,2021,2022];
  const yearRows=years.map(y=>{
    const ya=ans.filter(a=>a.year===y);
    const yc=ya.filter(a=>a.is_correct).length;
    const cov=Math.min(ya.length,30);
    const covPct=Math.round(cov/30*100);
    const ratePct=ya.length>0?Math.round(yc/ya.length*100):0;
    return `<div class="year-row">
      <span class="year-label">${y}</span>
      <div class="bar-wrap">
        <div class="bar-bg bar-cov"><div class="bar-fill" style="width:${covPct}%"></div></div>
        <div class="bar-bg bar-rate"><div class="bar-fill" style="width:${ratePct}%"></div></div>
        <div class="bar-meta"><span>已做 ${ya.length} 题</span><span>正确率 ${ratePct}%</span></div>
      </div>
    </div>`;
  }).join('');

  // diff breakdown
  const diffs=[['easy','⭐ 简单'],['medium','⭐⭐ 中等'],['hard','⭐⭐⭐ 困难']];
  const diffCards=diffs.map(([d,label])=>{
    const da=ans.filter(a=>a.difficulty===d);
    const dc=da.filter(a=>a.is_correct).length;
    const r=da.length>0?Math.round(dc/da.length*100):'-';
    return `<div class="diff-card ${d}">
      <div class="d-name">${label}</div>
      <div class="d-rate">${r}${da.length>0?'%':''}</div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:4px">${da.length} 题</div>
    </div>`;
  }).join('');

  // recent 20
  const recent=ans.slice(0,20);
  const rows=recent.map(a=>{
    const d=new Date(a.created_at);
    const dstr=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const badge=a.is_correct
      ?(a.attempt_number===1?'<span class="badge ok">✓ 满分</span>':'<span class="badge half">✓ 半分</span>')
      :'<span class="badge fail">✗ 错误</span>';
    return `<tr>
      <td>${dstr}</td>
      <td>${a.year}</td>
      <td>${a.difficulty==='easy'?'简单':a.difficulty==='medium'?'中等':'困难'}</td>
      <td>${badge}</td>
      <td>${a.time_taken||0}s</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="big-stats">
      <div class="stat-card c"><div class="label">累计答对</div><div class="val">${correct}</div></div>
      <div class="stat-card w"><div class="label">累计答错</div><div class="val">${wrong}</div></div>
      <div class="stat-card r"><div class="label">总正确率</div><div class="val">${rate}%</div></div>
      <div class="stat-card t"><div class="label">平均用时</div><div class="val">${avgT}s</div></div>
    </div>
    <div class="section">
      <div class="section-title">📅 年份分布</div>
      ${yearRows}
    </div>
    <div class="section">
      <div class="section-title">🎯 难度分布</div>
      <div class="diff-grid">${diffCards}</div>
    </div>
    <div class="section">
      <div class="section-title">🕐 最近答题记录</div>
      <table>
        <thead><tr><th>时间</th><th>年份</th><th>难度</th><th>结果</th><th>用时</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">暂无记录</td></tr>'}</tbody>
      </table>
    </div>`;
}
</script>
<nav class="bottom-nav">
  <a href="practice.html" class="bn-item">
    <span>📝</span><span>练习</span>
  </a>
  <a href="stats.html" class="bn-item active">
    <span>📊</span><span>统计</span>
  </a>
  <a href="#" class="bn-item" onclick="handleLogout()">
    <span>🚪</span><span>退出</span>
  </a>
</nav>
<style>
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(22,22,42,.97);border-top:1px solid var(--border);
  padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));
  z-index:200;justify-content:space-around;}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;
  text-decoration:none;color:var(--muted);font-size:0.7rem;font-weight:700;padding:4px 20px;}
.bn-item span:first-child{font-size:1.4rem;}
.bn-item.active{color:var(--accent);}
@media(max-width:600px){
  .bottom-nav{display:flex;}
  .page{padding-bottom:80px;}
  /* hide top nav buttons on mobile */
  nav .btn-nav{display:none;}
}
</style>
</body>
</html>
